<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Fantaschedina — ' + ${league.name}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${league.name}"></li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-1">
        <div class="d-flex align-items-center gap-2">
            <h4 class="mb-0" th:text="${league.name}"></h4>
            <span class="badge"
                  th:classappend="${league.status.name() == 'ACTIVE'} ? 'bg-success' : (${league.status.name() == 'SETUP'} ? 'bg-warning text-dark' : 'bg-secondary')"
                  th:text="${league.status.label}"></span>
        </div>
        <a th:href="@{/leagues/{id}/history(id=${league.id})}" class="btn btn-outline-secondary btn-sm">Storico</a>
    </div>
    <p class="text-muted mb-1" th:text="${league.season}"></p>
    <p class="mb-4" th:if="${myTeam != null}">
        La tua squadra: <strong th:text="${myTeam.name}"></strong>
    </p>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(matchdays)}" class="alert alert-info">
        Nessuna giornata disponibile.
    </div>

    <div class="list-group" th:unless="${#lists.isEmpty(matchdays)}">
        <a th:each="md : ${matchdays}"
           th:href="@{/leagues/{leagueId}/matchdays/{mdId}(leagueId=${league.id}, mdId=${md.id})}"
           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3"
           th:with="slip=${slipsByMatchday[md.id]}">

            <div>
                <strong th:text="'Giornata ' + ${md.number}"></strong>
                <span class="ms-2 badge"
                      th:classappend="${md.status.name() == 'OPEN'} ? 'bg-success' :
                                       (${md.status.name() == 'PROCESSED'} ? 'bg-secondary' :
                                       (${md.status.name() == 'RESULTS_LOADED'} ? 'bg-info text-dark' :
                                       (${md.status.name() == 'CLOSED'} ? 'bg-danger' : 'bg-warning text-dark')))"
                      th:text="${md.status.label}"></span>
                <div class="text-muted small mt-1" th:if="${deadlines.containsKey(md.id)}">
                    Scadenza: <span th:text="${#temporals.format(deadlines[md.id], 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <div class="text-muted small mt-1" th:unless="${deadlines.containsKey(md.id)}">
                    Scadenza non ancora impostata
                </div>
            </div>

            <div class="d-flex align-items-center gap-2">
                <span th:if="${slip != null}" class="badge"
                      th:classappend="${slip.status.name() == 'WON'}   ? 'bg-success' :
                                       (${slip.status.name() == 'LOST'}  ? 'bg-danger'  :
                                       (${slip.status.name() == 'VOID'}  ? 'bg-secondary' : 'bg-warning text-dark'))"
                      th:text="${slip.status.label}"></span>
                <span class="text-muted">&rsaquo;</span>
            </div>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
