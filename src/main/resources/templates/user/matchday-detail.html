<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Fantaschedina — Giornata ' + ${matchday.number}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-2">
            <span class="text-white small" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-3 px-3">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb small mb-0">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{id}/matchdays(id=${league.id})}" th:text="${league.name}"></a>
            </li>
            <li class="breadcrumb-item active" th:text="'Giornata ' + ${matchday.number}"></li>
        </ol>
    </nav>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header giornata -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="mb-0 fw-bold" th:text="'Giornata ' + ${matchday.number}"></h5>
            <span class="text-muted small" th:if="${myTeam != null}" th:text="${myTeam.name}"></span>
        </div>
        <span class="badge fs-6"
              th:classappend="${matchday.status.name() == 'OPEN'} ? 'bg-success' :
                               (${matchday.status.name() == 'PROCESSED'} ? 'bg-secondary' :
                               (${matchday.status.name() == 'RESULTS_LOADED'} ? 'bg-info text-dark' :
                               (${matchday.status.name() == 'CLOSED'} ? 'bg-danger' : 'bg-warning text-dark')))"
              th:text="${matchday.status.label}"></span>
    </div>

    <!-- Scadenza / countdown -->
    <div th:if="${deadline != null}" class="alert py-2"
         th:classappend="${matchday.status.name() == 'OPEN'} ? 'alert-success' : 'alert-secondary'">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="small">Scadenza: <strong th:text="${#temporals.format(deadline, 'dd/MM/yyyy HH:mm')}"></strong></span>
            <span th:if="${matchday.status.name() == 'OPEN'}" id="countdown" class="fw-bold"></span>
        </div>
    </div>
    <div th:unless="${deadline != null}" class="alert alert-warning py-2 small">
        Scadenza non ancora impostata.
    </div>

    <!-- CTA schedina -->
    <div th:if="${matchday.status.name() == 'OPEN'}" class="mb-3">
        <div th:if="${mySlip == null}" class="d-grid">
            <a th:href="@{/leagues/{lid}/matchdays/{mid}/bet(lid=${league.id},mid=${matchday.id})}"
               class="btn btn-success btn-lg py-3 fw-bold">Compila schedina</a>
        </div>
        <div th:unless="${mySlip == null}" class="alert alert-success py-2 d-flex justify-content-between align-items-center mb-0">
            <span class="small fw-semibold">Schedina inviata</span>
            <span class="badge bg-success" th:text="${mySlip.status.label}"></span>
        </div>
    </div>

    <!-- La tua schedina (pick list) -->
    <div th:if="${mySlip != null}" class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0 fw-semibold">La tua schedina</h6>
            <div class="d-flex gap-1 align-items-center">
                <span th:if="${mySlip.isAutoSubmitted}" class="badge bg-warning text-dark">Auto</span>
                <span class="text-muted" style="font-size:0.7rem"
                      th:text="${#temporals.format(mySlip.submittedAt, 'dd/MM HH:mm')}"></span>
            </div>
        </div>
        <div class="card shadow-sm">
            <div th:each="pick, pickStat : ${myPicks}"
                 class="d-flex justify-content-between align-items-center px-3 py-2"
                 th:classappend="${!pickStat.last} ? 'border-bottom' : ''">
                <div style="flex:1; min-width:0;">
                    <div class="small fw-semibold text-truncate">
                        <span th:each="f : ${fixtures}" th:if="${f.id == pick.matchdayFixtureId}"
                              th:text="${teamNames[f.homeFantaTeamId]} + ' – ' + ${teamNames[f.awayFantaTeamId]}">
                        </span>
                    </div>
                    <div class="text-muted" style="font-size:0.7rem" th:text="${pick.outcomeType.label}"></div>
                </div>
                <div class="d-flex align-items-center gap-2 ms-2 flex-shrink-0">
                    <span class="badge bg-primary px-2" th:text="${pick.pickedOutcome}"></span>
                    <span th:if="${mySlip.status.name() != 'PENDING'}">
                        <span th:if="${pick.isCorrect == true}"  class="text-success fw-bold">✓</span>
                        <span th:if="${pick.isCorrect == false}" class="text-danger fw-bold">✗</span>
                        <span th:if="${pick.isCorrect == null}"  class="text-muted">—</span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Partite -->
    <h6 class="fw-semibold mb-2">Partite</h6>

    <div th:if="${#lists.isEmpty(fixtures)}" class="alert alert-info py-2 small">
        Nessuna partita caricata per questa giornata.
    </div>

    <div th:unless="${#lists.isEmpty(fixtures)}" class="card shadow-sm">
        <div th:each="fixture, fixStat : ${fixtures}"
             class="row g-0 align-items-center px-3 py-2"
             th:classappend="${!fixStat.last} ? 'border-bottom' : ''"
             th:with="pick=${mySlip != null ? picksByFixture[fixture.id] : null}">
            <div class="col-5 text-end">
                <span class="fw-semibold text-truncate d-block" style="font-size:0.75rem"
                      th:text="${teamNames[fixture.homeFantaTeamId]}"></span>
            </div>
            <div class="col-2 text-center fw-bold" style="font-size:0.75rem">
                <span th:if="${fixture.resultLoaded}"
                      th:text="${fixture.homeScore} + '–' + ${fixture.awayScore}"></span>
                <span th:unless="${fixture.resultLoaded}" class="text-muted">vs</span>
            </div>
            <div class="col-5 d-flex align-items-center gap-1">
                <span class="fw-semibold text-truncate" style="font-size:0.75rem"
                      th:text="${teamNames[fixture.awayFantaTeamId]}"></span>
                <span th:if="${pick != null}" class="badge flex-shrink-0" style="font-size:0.7rem"
                      th:classappend="${pick.isCorrect == null}  ? 'bg-warning text-dark' :
                                      (${pick.isCorrect == true} ? 'bg-success' : 'bg-danger')"
                      th:text="${pick.pickedOutcome}"></span>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${deadline != null and matchday.status.name() == 'OPEN'}"
        th:inline="javascript">
    const deadlineMs = new Date([[${#temporals.format(deadline, "yyyy-MM-dd'T'HH:mm:ss")}]]).getTime();
    const el = document.getElementById('countdown');

    function updateCountdown() {
        const diff = deadlineMs - Date.now();
        if (diff <= 0) {
            el.textContent = 'Scaduta';
            el.classList.add('text-danger');
            return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.textContent = `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>
</body>
</html>
