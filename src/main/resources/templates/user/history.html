<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Storico — ' + ${league.name}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{id}/matchdays(id=${league.id})}" th:text="${league.name}"></a>
            </li>
            <li class="breadcrumb-item active">Storico</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Storico</h4>
        <div>
            <span class="text-muted me-2" th:if="${myTeam != null}" th:text="${myTeam.name}"></span>
            <span class="fw-bold">Saldo: <span th:text="${membership.balance}"></span> cr.</span>
        </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="historyTabs">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#schedine">Schedine</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#crediti">Crediti</a>
        </li>
    </ul>

    <div class="tab-content">

        <!-- Schedine -->
        <div class="tab-pane fade show active" id="schedine">
            <div th:if="${#lists.isEmpty(slips)}" class="alert alert-info">
                Nessuna schedina inviata finora.
            </div>
            <div th:unless="${#lists.isEmpty(slips)}" class="d-flex flex-column gap-2">
                <a th:each="slip : ${slips}"
                   th:href="@{/leagues/{lid}/slips/{sid}(lid=${league.id},sid=${slip.id})}"
                   class="card card-body text-decoration-none text-dark py-2 px-3"
                   th:with="md=${matchdayMap[slip.matchdayId]}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fw-semibold" th:if="${md != null}"
                                  th:text="'Giornata ' + ${md.number}"></span>
                            <span th:if="${slip.isAutoSubmitted}"
                                  class="ms-1 badge bg-warning text-dark">Auto</span>
                            <div class="text-muted small"
                                 th:text="${#temporals.format(slip.submittedAt, 'dd/MM/yyyy HH:mm')}"></div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge"
                                  th:classappend="${slip.status.name() == 'WON'}   ? 'bg-success' :
                                                   (${slip.status.name() == 'LOST'}  ? 'bg-danger'  :
                                                   (${slip.status.name() == 'VOID'}  ? 'bg-secondary' : 'bg-warning text-dark'))"
                                  th:text="${slip.status.label}"></span>
                            <span class="text-muted">›</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Crediti -->
        <div class="tab-pane fade" id="crediti">
            <div th:if="${#lists.isEmpty(transactions)}" class="alert alert-info">
                Nessuna transazione registrata.
            </div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(transactions)}">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Data</th>
                            <th>Tipo</th>
                            <th class="text-end">Importo</th>
                            <th class="text-end">Saldo</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tx : ${transactions}">
                            <td class="text-muted small"
                                th:text="${#temporals.format(tx.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${tx.type.name() == 'WIN_CREDIT'}      ? 'bg-success' :
                                                       (${tx.type.name() == 'INITIAL_DEPOSIT'} ? 'bg-info text-dark' :
                                                       (${tx.type.name() == 'ADMIN_ADJUST'}    ? 'bg-warning text-dark' : 'bg-secondary'))"
                                      th:text="${tx.type.label}"></span>
                            </td>
                            <td class="text-end fw-bold"
                                th:classappend="${tx.amount >= 0} ? 'text-success' : 'text-danger'"
                                th:text="${tx.amount >= 0} ? ('+' + ${tx.amount}) : ${tx.amount}"></td>
                            <td class="text-end" th:text="${tx.balanceAfter}"></td>
                            <td class="text-muted small" th:text="${tx.note}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
