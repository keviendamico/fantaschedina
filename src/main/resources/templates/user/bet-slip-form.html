<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Schedina — Giornata ' + ${matchday.number}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .outcome-btn { min-height: 46px; font-size: 1rem; font-weight: 600; }
        .fixture-card .selected-label {
            font-size: 0.75rem;
            min-height: 1.1rem;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-2">
            <span class="text-white small" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-3 px-3" style="max-width: 600px;">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb small mb-0">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{lid}/matchdays/{mid}(lid=${league.id},mid=${matchday.id})}"
                   th:text="'Giornata ' + ${matchday.number}"></a>
            </li>
            <li class="breadcrumb-item active">Schedina</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0 fw-bold" th:text="'Schedina G' + ${matchday.number}"></h5>
        <span class="text-muted small" th:if="${myTeam != null}" th:text="${myTeam.name}"></span>
    </div>

    <div class="alert alert-success d-flex justify-content-between align-items-center py-2 mb-3" th:if="${deadline != null}">
        <span class="small">Scade: <strong th:text="${#temporals.format(deadline, 'dd/MM HH:mm')}"></strong></span>
        <span id="countdown" class="fw-bold small"></span>
    </div>

    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(fixtures)}" class="alert alert-warning">
        Nessuna partita caricata. Contatta l'amministratore.
    </div>

    <div th:unless="${#lists.isEmpty(fixtures)}">

        <form id="slipForm"
              th:action="@{/leagues/{lid}/matchdays/{mid}/bet(lid=${league.id},mid=${matchday.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div id="picksContainer"></div>

            <!-- Una card per partita -->
            <div th:each="fixture : ${fixtures}"
                 class="card mb-3 shadow-sm fixture-card"
                 th:data-fixture-id="${fixture.id}">
                <div class="card-body p-3">

                    <div class="fw-semibold mb-3"
                         th:text="${teamNames[fixture.homeFantaTeamId]} + ' – ' + ${teamNames[fixture.awayFantaTeamId]}">
                    </div>

                    <!-- Un gruppo di bottoni per ogni tipo di esito previsto dal template -->
                    <div th:each="tmpl, tmplStat : ${templates}"
                         class="outcome-group"
                         th:classappend="${!tmplStat.last} ? ' mb-3' : ''"
                         th:data-type="${tmpl.outcomeType.name()}">

                        <div class="text-muted small mb-1 d-flex justify-content-between">
                            <span th:text="${tmpl.outcomeType.label}"></span>
                            <span th:if="${tmpl.outcomeType.name() == 'OVER_UNDER'}"
                                  th:text="'soglia ' + ${tmpl.overUnderThreshold}"></span>
                        </div>

                        <div class="btn-group w-100" role="group">

                            <th:block th:if="${tmpl.outcomeType.name() == 'RESULT_1X2'}">
                                <button type="button" class="btn btn-outline-primary outcome-btn"
                                        data-color="primary" data-value="1">1</button>
                                <button type="button" class="btn btn-outline-primary outcome-btn"
                                        data-color="primary" data-value="X">X</button>
                                <button type="button" class="btn btn-outline-primary outcome-btn"
                                        data-color="primary" data-value="2">2</button>
                            </th:block>

                            <th:block th:if="${tmpl.outcomeType.name() == 'DOUBLE_CHANCE'}">
                                <button type="button" class="btn btn-outline-success outcome-btn"
                                        data-color="success" data-value="1X">1X</button>
                                <button type="button" class="btn btn-outline-success outcome-btn"
                                        data-color="success" data-value="12">12</button>
                                <button type="button" class="btn btn-outline-success outcome-btn"
                                        data-color="success" data-value="X2">X2</button>
                            </th:block>

                            <th:block th:if="${tmpl.outcomeType.name() == 'GOAL_NOGOAL'}">
                                <button type="button" class="btn btn-outline-warning outcome-btn"
                                        data-color="warning" data-value="GG">GG</button>
                                <button type="button" class="btn btn-outline-warning outcome-btn"
                                        data-color="warning" data-value="NG">NG</button>
                            </th:block>

                            <th:block th:if="${tmpl.outcomeType.name() == 'OVER_UNDER'}">
                                <button type="button" class="btn btn-outline-danger outcome-btn"
                                        data-color="danger" data-value="OVER">Over</button>
                                <button type="button" class="btn btn-outline-danger outcome-btn"
                                        data-color="danger" data-value="UNDER">Under</button>
                            </th:block>

                        </div>
                    </div>

                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-3" id="req-bar">
                <span th:each="tmpl : ${templates}"
                      class="badge bg-secondary px-3 py-2 req-badge"
                      th:data-type="${tmpl.outcomeType.name()}"
                      th:data-required="${tmpl.requiredCount}"
                      style="font-size:0.85rem">
                    <span th:text="${tmpl.outcomeType.label}"></span>:
                    <span class="req-current">0</span>/<span th:text="${tmpl.requiredCount}"></span>
                </span>
            </div>

            <div class="d-grid mb-5">
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg py-3 fw-bold" disabled>
                    Invia schedina
                </button>
            </div>

        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${deadline != null}" th:inline="javascript">
    const deadlineMs = new Date([[${#temporals.format(deadline, "yyyy-MM-dd'T'HH:mm:ss")}]]).getTime();
    const cdEl = document.getElementById('countdown');
    function updateCountdown() {
        const diff = deadlineMs - Date.now();
        if (diff <= 0) { cdEl.textContent = 'Scaduta'; cdEl.classList.add('text-danger'); return; }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        cdEl.textContent = `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>
<script>
    // requirements: { type -> requiredCount }
    const requirements = {};
    document.querySelectorAll('.req-badge').forEach(b => {
        requirements[b.dataset.type] = parseInt(b.dataset.required);
    });

    // selections: { fixtureId -> { type, value } }
    const selections = {};

    function countByType() {
        const counts = {};
        Object.values(selections).forEach(s => {
            counts[s.type] = (counts[s.type] || 0) + 1;
        });
        return counts;
    }

    function isComplete() {
        const counts = countByType();
        const fixtureCards = document.querySelectorAll('.fixture-card');
        if (Object.keys(selections).length !== fixtureCards.length) return false;
        return Object.entries(requirements).every(([t, req]) => (counts[t] || 0) === req);
    }

    function updateUI() {
        const counts = countByType();
        document.querySelectorAll('.req-badge').forEach(b => {
            const type = b.dataset.type;
            const req = parseInt(b.dataset.required);
            const cur = counts[type] || 0;
            b.querySelector('.req-current').textContent = cur;
            b.classList.remove('bg-secondary', 'bg-success', 'bg-danger');
            if (cur === req) {
                b.classList.add('bg-success');
            } else if (cur > req) {
                b.classList.add('bg-danger');
            } else {
                b.classList.add('bg-secondary');
            }
        });
        document.getElementById('submitBtn').disabled = !isComplete();
    }

    function clearFixtureSelection(card) {
        const fid = card.dataset.fixtureId;
        if (!selections[fid]) return;
        const prevType = selections[fid].type;
        const prevGroup = card.querySelector(`.outcome-group[data-type="${prevType}"]`);
        if (prevGroup) {
            prevGroup.querySelectorAll('.outcome-btn').forEach(b => {
                const color = b.dataset.color;
                b.classList.remove(`btn-${color}`);
                b.classList.add(`btn-outline-${color}`);
            });
        }
        delete selections[fid];
    }

    document.querySelectorAll('.fixture-card').forEach(card => {
        const fixtureId = card.dataset.fixtureId;

        card.querySelectorAll('.outcome-group').forEach(group => {
            const outcomeType = group.dataset.type;

            group.querySelectorAll('.outcome-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const value = btn.dataset.value;
                    const color = btn.dataset.color;

                    // Click on already-selected button → deselect
                    if (selections[fixtureId] &&
                        selections[fixtureId].type === outcomeType &&
                        selections[fixtureId].value === value) {
                        btn.classList.remove(`btn-${color}`);
                        btn.classList.add(`btn-outline-${color}`);
                        btn.blur();
                        delete selections[fixtureId];
                        updateUI();
                        return;
                    }

                    // Deselect any previous selection for this fixture
                    clearFixtureSelection(card);

                    // Deselect siblings in same group (visual only, already cleared above)
                    group.querySelectorAll('.outcome-btn').forEach(b => {
                        const c = b.dataset.color;
                        b.classList.remove(`btn-${c}`);
                        b.classList.add(`btn-outline-${c}`);
                    });

                    // Select this button
                    btn.classList.remove(`btn-outline-${color}`);
                    btn.classList.add(`btn-${color}`);
                    selections[fixtureId] = { type: outcomeType, value };

                    updateUI();
                });
            });
        });
    });

    document.getElementById('slipForm').addEventListener('submit', e => {
        if (!isComplete()) { e.preventDefault(); return; }
        const container = document.getElementById('picksContainer');
        container.innerHTML = '';
        let i = 0;
        Object.entries(selections).forEach(([fixtureId, sel]) => {
            container.innerHTML +=
                `<input type="hidden" name="picks[${i}].fixtureId" value="${fixtureId}">` +
                `<input type="hidden" name="picks[${i}].outcomeType" value="${sel.type}">` +
                `<input type="hidden" name="picks[${i}].pickedOutcome" value="${sel.value}">`;
            i++;
        });
    });

    updateUI();
</script>
</body>
</html>
