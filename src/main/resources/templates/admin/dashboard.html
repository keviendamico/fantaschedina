<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h4 class="mb-4">Dashboard</h4>

    <!-- Leghe -->
    <div class="row g-3 mb-4">
        <div th:each="card : ${leagueCards}" class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="fw-semibold" th:text="${card.league.name}"></span>
                    <span class="text-muted small" th:text="${card.league.season}"></span>
                </div>
                <div class="card-body">

                    <!-- Giornata corrente -->
                    <div th:if="${card.currentMatchday != null}" class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="fw-semibold small text-muted text-uppercase">Giornata corrente</span>
                            <span class="badge"
                                  th:text="${card.currentMatchday.status.label}"
                                  th:classappend="${card.currentMatchday.status.name() == 'OPEN'} ? 'bg-success' :
                                                  (${card.currentMatchday.status.name() == 'CLOSED'} ? 'bg-warning text-dark' :
                                                  'bg-secondary')">
                            </span>
                        </div>
                        <div class="d-flex justify-content-between align-items-end">
                            <span>Giornata <strong th:text="${card.currentMatchday.number}"></strong></span>
                            <span class="text-muted small"
                                  th:if="${card.effectiveDeadline != null}"
                                  th:text="'Deadline: ' + ${#temporals.format(card.effectiveDeadline, 'dd/MM HH:mm')}">
                            </span>
                        </div>
                        <!-- Schedine (solo OPEN) -->
                        <div th:if="${card.hasOpenMatchday()}" class="mt-1">
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar bg-success"
                                     th:style="'width: ' + ${card.totalTeams > 0 ? (card.slipsSubmitted * 100 / card.totalTeams) : 0} + '%'">
                                </div>
                            </div>
                            <span class="text-muted small"
                                  th:text="${card.slipsSubmitted} + '/' + ${card.totalTeams} + ' schedine'">
                            </span>
                        </div>
                    </div>
                    <div th:if="${card.currentMatchday == null}" class="text-muted small mb-3 fst-italic">
                        Nessuna giornata attiva
                    </div>

                    <!-- Jackpot -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-semibold small text-muted text-uppercase">Jackpot</span>
                        <span th:if="${card.jackpot != null}"
                              th:text="${card.jackpot} + ' cr'"
                              class="fw-bold"></span>
                        <span th:if="${card.jackpot == null}" class="text-muted">—</span>
                    </div>

                    <!-- Link rapidi -->
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/admin/leagues/{id}(id=${card.league.id})}"
                           class="btn btn-sm btn-outline-secondary">Lega</a>
                        <a th:href="@{/admin/leagues/{id}/calendar(id=${card.league.id})}"
                           class="btn btn-sm btn-outline-secondary">Calendario</a>
                        <a th:if="${card.hasClosedMatchday()}"
                           th:href="@{/admin/leagues/{lid}/matchdays/{mid}/results(lid=${card.league.id},mid=${card.currentMatchday.id})}"
                           class="btn btn-sm btn-warning">Carica risultati</a>
                        <button th:if="${card.hasOpenMatchday()}" type="button"
                                class="btn btn-sm btn-outline-secondary"
                                th:data-path="@{/leagues/{lid}/matchdays/{mid}/bet(lid=${card.league.id},mid=${card.currentMatchday.id})}"
                                onclick="copyMatchdayLink(this)">Copia link</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Inviti in scadenza -->
    <div th:if="${!#lists.isEmpty(expiringInvites)}">
        <h6 class="text-muted text-uppercase small mb-2">Inviti in scadenza (entro 3 giorni)</h6>
        <div class="card shadow-sm">
            <ul class="list-group list-group-flush">
                <li th:each="invite : ${expiringInvites}"
                    class="list-group-item d-flex justify-content-between align-items-center">
                    <span th:text="${invite.email}"></span>
                    <span class="text-muted small"
                          th:text="'Scade: ' + ${#temporals.format(invite.expiresAt, 'dd/MM/yyyy')}">
                    </span>
                </li>
            </ul>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function copyMatchdayLink(btn) {
        const url = window.location.origin + btn.dataset.path;
        navigator.clipboard.writeText(url).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'Copiato!';
            btn.classList.replace('btn-outline-secondary', 'btn-success');
            setTimeout(() => {
                btn.textContent = orig;
                btn.classList.replace('btn-success', 'btn-outline-secondary');
            }, 2000);
        });
    }
</script>
</body>
</html>
