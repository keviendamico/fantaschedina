<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Fantaschedina — ' + ${league.name} + ' — Componenti'">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="mb-4 d-flex justify-content-between align-items-end">
        <div>
            <a th:href="@{/admin/leagues/{id}(id=${league.id})}" class="text-muted small">← Dettaglio lega</a>
            <h4 class="mb-0 mt-1" th:text="${league.name} + ' — Componenti'"></h4>
            <span class="text-muted" th:text="${league.season}"></span>
        </div>
        <span class="text-muted small" th:text="${#lists.size(members)} + ' iscritti'"></span>
    </div>

    <!-- Tabella componenti -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(members)}" class="p-3 text-muted fst-italic">
                Nessun iscritto.
            </div>
            <table th:unless="${#lists.isEmpty(members)}"
                   class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Utente</th>
                        <th>Squadra</th>
                        <th class="text-end">Crediti</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${members}">
                        <td th:text="${row.user().username}"></td>
                        <td class="text-muted small"
                            th:text="${row.fantaTeam() != null ? row.fantaTeam().name : '—'}"></td>
                        <td class="text-end fw-semibold"
                            th:text="${row.membership().balance} + ' cr'"></td>
                        <td class="text-end">
                            <button type="button" class="btn btn-outline-primary btn-sm"
                                    data-bs-toggle="modal" data-bs-target="#adjustModal"
                                    th:data-membership-id="${row.membership().id}"
                                    th:data-league-id="${league.id}"
                                    th:data-username="${row.user().username}"
                                    th:data-balance="${row.membership().balance}">
                                Rettifica
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal rettifica crediti -->
<div class="modal fade" id="adjustModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Rettifica crediti</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="adjustForm" method="post">
                <div class="modal-body">
                    <p class="mb-3">
                        Utente: <strong id="modalUsername"></strong> &mdash;
                        Saldo attuale: <strong id="modalBalance"></strong>
                    </p>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Delta crediti</label>
                        <div class="input-group">
                            <input type="number" name="delta" id="modalDelta"
                                   class="form-control" placeholder="es. +5 o -3" required>
                            <span class="input-group-text">cr</span>
                        </div>
                        <div class="form-text">Valore positivo per aggiungere, negativo per sottrarre.</div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-semibold">Nota (opzionale)</label>
                        <input type="text" name="note" class="form-control" placeholder="Motivo della rettifica">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="submit" class="btn btn-primary">Conferma</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('adjustModal').addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        document.getElementById('modalUsername').textContent = btn.dataset.username;
        document.getElementById('modalBalance').textContent = btn.dataset.balance + ' cr';
        document.getElementById('modalDelta').value = '';
        document.getElementById('adjustForm').action =
            '/admin/leagues/' + btn.dataset.leagueId + '/members/' + btn.dataset.membershipId + '/adjust';
    });
</script>
</body>
</html>
