<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Lega</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="d-flex align-items-center gap-2 mb-3">
                <a href="/admin/leagues" class="btn btn-outline-secondary btn-sm">← Leghe</a>
                <h4 class="mb-0" th:text="${leagueId} ? 'Modifica lega' : 'Nuova lega'"></h4>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <!-- POST /admin/leagues per create, POST /admin/leagues/{id} per update -->
                    <form th:action="${leagueId} ? @{/admin/leagues/{id}(id=${leagueId})} : @{/admin/leagues}"
                          th:object="${leagueRequest}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label">Nome lega</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="season" class="form-label">Stagione</label>
                            <input type="text" class="form-control" id="season" th:field="*{season}"
                                   placeholder="es. 2025-26" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('season')}" th:errors="*{season}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="matchdayCost" class="form-label">Costo schedina (crediti)</label>
                                <input type="number" class="form-control" id="matchdayCost"
                                       th:field="*{matchdayCost}" min="1" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('matchdayCost')}" th:errors="*{matchdayCost}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="jackpotStart" class="form-label">Jackpot iniziale</label>
                                <input type="number" class="form-control" id="jackpotStart"
                                       th:field="*{jackpotStart}" min="0" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('jackpotStart')}" th:errors="*{jackpotStart}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="betDeadlineMinutes" class="form-label">Deadline (minuti prima del calcio d'inizio)</label>
                                <input type="number" class="form-control" id="betDeadlineMinutes"
                                       th:field="*{betDeadlineMinutes}" min="1" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('betDeadlineMinutes')}" th:errors="*{betDeadlineMinutes}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="maxTeams" class="form-label">Numero massimo di squadre</label>
                                <input type="number" class="form-control" id="maxTeams"
                                       th:field="*{maxTeams}" min="2" placeholder="Facoltativo">
                                <div class="form-text">Limita le partite per giornata a metà di questo valore.</div>
                                <div class="text-danger small" th:if="${#fields.hasErrors('maxTeams')}" th:errors="*{maxTeams}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salva</button>
                            <a href="/admin/leagues" class="btn btn-outline-secondary">Annulla</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
